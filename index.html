<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDB — Inventario Obra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root { --amarillo: #F5C400; --fondo: #1A1A1A; --sup: #242424; --borde: #3A3A3A; --texto: #F0EDE4; --verde: #3DB85A; --rojo: #E24B4A; }
  
  html, body { background: var(--fondo); color: var(--texto); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100%; position: fixed; width: 100%; }

  #header-fijo { background: var(--sup); border-bottom: 2px solid var(--amarillo); padding: 12px 10px; z-index: 100; }
  
  .controles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  .btn-acc { border: none; padding: 14px 0; border-radius: 6px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: white; text-align: center; }
  .btn-guardar { background: var(--amarillo); color: black; }
  .btn-pdf { background: var(--verde); }

  #contenedor-tabla { overflow: auto; height: calc(100vh - 100px); background: var(--fondo); }

  table { width: 100%; min-width: 600px; border-collapse: collapse; font-size: 12px; }
  th { position: sticky; top: 0; background: #2E2E2E; color: var(--amarillo); padding: 10px 5px; text-align: left; border-bottom: 2px solid var(--borde); z-index: 20; }
  .separador-cat { background: #333; color: var(--amarillo); font-weight: 900; padding: 8px 10px; border-left: 5px solid var(--amarillo); font-size: 13px; }
  td { padding: 12px 5px; border-bottom: 1px solid var(--borde); vertical-align: middle; }

  .col-nom { font-weight: bold; position: sticky; left: 0; background: #1A1A1A; z-index: 10; border-right: 1px solid var(--borde); width: 140px; }
  .badge { padding: 4px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; text-transform: uppercase; }
  .bueno { background: rgba(61,184,90,0.2); color: var(--verde); }
  .roto, .perdido { background: rgba(226,75,74,0.2); color: var(--rojo); }

  #fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--amarillo); border-radius: 50%; border: none; font-size: 32px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-weight: bold; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
  .modal { background: var(--sup); width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; }
  input, select, textarea { width: 100%; background: #000; color: white; border: 1px solid var(--borde); padding: 12px; margin: 5px 0 15px 0; border-radius: 6px; box-sizing: border-box; font-size: 16px; /* Evita zoom en iPhone */ }
</style>
</head>
<body>

<div id="header-fijo">
  <div class="controles">
    <button class="btn-acc btn-guardar" onclick="guardarLocal()">Guardar Local</button>
    <button class="btn-acc btn-pdf" onclick="exportarPDF()">Reporte PDF</button>
  </div>
</div>

<div id="contenedor-tabla">
  <table>
    <thead>
      <tr>
        <th class="col-nom">Herramienta</th>
        <th style="width:40px">Cant</th>
        <th style="width:80px">Estado</th>
        <th style="width:120px">Obs</th>
        <th style="width:60px">Acción</th>
      </tr>
    </thead>
    <tbody id="body-tabla"></tbody>
  </table>
</div>

<button id="fab" onclick="abrirCarga()">+</button>

<div class="overlay" id="modal-form">
  <div class="modal">
    <h3 id="modal-tit" style="color:var(--amarillo); margin-top:0;">Cargar Elemento</h3>
    <input type="text" id="f-nom" placeholder="Nombre">
    <input type="number" id="f-cant" placeholder="Cantidad" value="1">
    <input type="text" id="f-cat" placeholder="Categoría">
    <select id="f-est">
        <option value="Bueno">Bueno</option>
        <option value="Regular">Regular</option>
        <option value="Roto">Roto</option>
        <option value="Perdido">Perdido</option>
    </select>
    <textarea id="f-obs" placeholder="Observaciones"></textarea>
    <button class="btn-acc btn-guardar" style="width:100%; font-size:14px" onclick="procesarForm()">CONFIRMAR</button>
    <button onclick="cerrarModal()" style="width:100%; background:none; color:gray; border:none; margin-top:10px">CANCELAR</button>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('sdb_inv_v6')) || [];
let idEdit = null;

function render() {
  const body = document.getElementById('body-tabla');
  body.innerHTML = "";
  
  if (db.length === 0) {
    body.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:30px; color:gray;'>No hay herramientas cargadas.</td></tr>";
    return;
  }

  const categorias = [...new Set(db.map(x => (x.cat || "OTROS").toUpperCase()))].sort();
  
  categorias.forEach(cat => {
    body.innerHTML += `<tr><td colspan="5" class="separador-cat">${cat}</td></tr>`;
    db.filter(x => (x.cat || "OTROS").toUpperCase() === cat).forEach(h => {
      body.innerHTML += `
        <tr>
          <td class="col-nom">${h.nom}</td>
          <td style="color:var(--amarillo); font-weight:bold; text-align:center;">${h.cant || 1}</td>
          <td><span class="badge ${h.est.toLowerCase()}">${h.est}</span></td>
          <td style="font-size:10px; color:#aaa; line-height:1.2;">${h.obs || '-'}</td>
          <td><button onclick="abrirEdicion(${h.id})" style="background:#333; color:var(--amarillo); border:1px solid #555; border-radius:4px; padding:8px 5px; width:100%;">EDIT</button></td>
        </tr>`;
    });
  });
}

function guardarLocal() {
  localStorage.setItem('sdb_inv_v6', JSON.stringify(db));
  alert("💾 Guardado en el teléfono");
}

function abrirCarga() { 
  idEdit = null; 
  document.querySelectorAll('#modal-form input, #modal-form textarea').forEach(i => i.value = "");
  document.getElementById('f-cant').value = "1";
  document.getElementById('modal-form').style.display = 'flex'; 
}

function abrirEdicion(id) {
  idEdit = id;
  const h = db.find(x => x.id === id);
  document.getElementById('f-nom').value = h.nom;
  document.getElementById('f-cant').value = h.cant;
  document.getElementById('f-cat').value = h.cat;
  document.getElementById('f-est').value = h.est;
  document.getElementById('f-obs').value = h.obs;
  document.getElementById('modal-form').style.display = 'flex';
}

function procesarForm() {
  const item = {
    id: idEdit || Date.now(),
    nom: document.getElementById('f-nom').value,
    cant: document.getElementById('f-cant').value,
    cat: (document.getElementById('f-cat').value || "OTROS").toUpperCase(),
    est: document.getElementById('f-est').value,
    obs: document.getElementById('f-obs').value
  };
  
  if(!item.nom) return alert("El nombre es obligatorio");

  if(idEdit) {
    const idx = db.findIndex(x => x.id === idEdit);
    db[idx] = item;
  } else { db.push(item); }
  
  guardarLocal();
  cerrarModal();
  render();
}

function cerrarModal() { document.getElementById('modal-form').style.display = 'none'; }
function exportarPDF() { window.print(); }

render();
</script>
</body>
</html>
